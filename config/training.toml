# PPO training configuration for QuidditchSimpleEnv.
# Loaded by train_ppo.py at startup; CLI flags (--timesteps, --n-envs, --lr)
# override individual values at runtime.

[training]
total_timesteps = 2_000_000
n_envs          = 4

[ppo]
n_steps    = 2048
batch_size = 64
n_epochs   = 10
lr         = 3e-4
gamma      = 0.99
gae_lambda = 0.95
clip_range = 0.2
ent_coef   = 0.01

[eval]
eval_freq_steps  = 50_000
n_eval_episodes  = 10

[callbacks]
checkpoint_freq_steps = 50_000
video_freq_steps      = 100_000
video_fps             = 20
