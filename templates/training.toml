# PPO training + env configuration for QuidditchSimpleEnv.
# This is the template — tracked in git.
#
# `make configs` copies this file to config/training.toml (also invoked
# by `make install`).  config/training.toml is gitignored; edit it freely
# while experimenting.
# `make promote` snapshots your working training.toml into models/<run>/ so
# any run can be reproduced later with `make repro MODEL=<name>`.
#
# Layout:
#   [training]            run-level metadata (name, total steps, n_envs, seed)
#   [training.ppo]        PPO hyperparameters
#   [training.eval]       periodic eval cadence
#   [training.callbacks]  checkpoint + video recording cadence
#   [env]                 task knobs (curriculum, episode length)
#
# Camera config (viewing-only, not part of run reproducibility) lives separately
# in config/camera.toml.

[training]
run_name        = "ppo_hoop"
total_timesteps = 10_000_000
n_envs          = 8
seed            = 42    # integer ≥ 0 for reproducible runs; -1 to disable

[training.ppo]
n_steps    = 1024
batch_size = 256
n_epochs   = 10
lr         = 3e-4
gamma      = 0.99
gae_lambda = 0.95
clip_range = 0.2
ent_coef   = 0.01

[training.eval]
eval_freq_steps  = 50_000
n_eval_episodes  = 10

[training.callbacks]
checkpoint_freq_steps = 50_000
# Video cadence is expressed in eval-units: video runs every Nth eval, so
# effective freq = eval_freq_steps × video_every_n_evals.  Set N=1 to record
# at every eval, or raise to keep videos cheaper than full eval cadence.
# Each video is also logged to TensorBoard (eval/video) in addition to mp4.
video_every_n_evals   = 4 # video runs every Nth eval (eval=50k, N=4 → 200k)
video_fps             = 20

# Checkpoint videos: 2x2 grid stitching four named cameras.
# `cells` is row-major: [top-left, top-right, bottom-left, bottom-right].
# Available cams in the scene:
#   fixed | north | east | south | west | top | fpv | tpv
# Per-cell size 960x540 → final 1920x1080 (1080p).  Each render does 4
# offscreen passes per frame, so checkpoint video time scales with
# cell_width * cell_height * 4.  Set grid = false to record only the
# cinematic "fixed" cam at 640x480 (faster, less informative).
[training.callbacks.video]
grid        = true
# Hoop sits at +X.  south pairs naturally with either east or west:
# west frames the approach from the drone-start side, east frames the
# goal head-on from behind the hoop.  north would mirror the hoop to
# the LEFT and is usually avoided.
cells       = ["south", "east", "top", "tpv"]
cell_width  = 960
cell_height = 540

# Environment / task parameters. These shape the task itself, not the PPO
# hyperparameters above.
#
# randomise_start: if true, sample a uniform start position inside the arena
#                  on each reset; if false, always spawn at (0, 0, 0).
# episode_seconds: per-episode timeout. The episode also ends on score, crash,
#                  or out-of-bounds — this is the upper bound only.
[env]
randomise_start = false
episode_seconds = 30.0
