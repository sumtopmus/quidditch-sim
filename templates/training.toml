# PPO training + env configuration for QuidditchSimpleEnv.
# This is the template — tracked in git.
#
# On first `make install`, this file is copied to config/training.toml.
# config/training.toml is gitignored; edit it freely while experimenting.
# `make promote` snapshots your working training.toml into models/<run>/ so
# any run can be reproduced later with `make repro MODEL=<name>`.
#
# Layout:
#   [training]            run-level metadata (name, total steps, n_envs, seed)
#   [training.ppo]        PPO hyperparameters
#   [training.eval]       periodic eval cadence
#   [training.callbacks]  checkpoint + video recording cadence
#   [env]                 task knobs (curriculum, episode length)
#
# Camera config (viewing-only, not part of run reproducibility) lives separately
# in config/camera.toml.

[training]
run_name        = "ppo_hoop"
total_timesteps = 2_000_000
n_envs          = 8
seed            = 42    # integer ≥ 0 for reproducible runs; -1 to disable

[training.ppo]
n_steps    = 1024
batch_size = 256
n_epochs   = 10
lr         = 3e-4
gamma      = 0.99
gae_lambda = 0.95
clip_range = 0.2
ent_coef   = 0.01

[training.eval]
eval_freq_steps  = 50_000
n_eval_episodes  = 10

[training.callbacks]
checkpoint_freq_steps = 50_000
video_freq_steps      = 100_000
video_fps             = 20

# Environment / task parameters. These shape the task itself, not the PPO
# hyperparameters above.
#
# randomise_start: if true, sample a uniform start position inside the arena
#                  on each reset; if false, always spawn at (0, 0, 0).
# episode_seconds: per-episode timeout. The episode also ends on score, crash,
#                  or out-of-bounds — this is the upper bound only.
[env]
randomise_start = false
episode_seconds = 30.0
