# PPO training configuration for QuidditchSimpleEnv.
# This is the template — tracked in git.
#
# On first `make install`, this file is copied to config/training.toml.
# config/training.toml is gitignored; edit it freely while experimenting.
# `make promote` snapshots your working training.toml into models/<run>/ so
# any run can be reproduced later with `make repro MODEL=<name>`.

[training]
run_name        = "ppo_hoop"
total_timesteps = 2_000_000
n_envs          = 8
seed            = 42    # integer ≥ 0 for reproducible runs; -1 to disable

[ppo]
n_steps    = 1024
batch_size = 256
n_epochs   = 10
lr         = 3e-4
gamma      = 0.99
gae_lambda = 0.95
clip_range = 0.2
ent_coef   = 0.01

[eval]
eval_freq_steps  = 50_000
n_eval_episodes  = 10

[callbacks]
checkpoint_freq_steps = 50_000
video_freq_steps      = 100_000
video_fps             = 20
