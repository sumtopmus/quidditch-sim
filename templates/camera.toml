# Camera spec for the cinematic "Fixed" cam.
# This is the template — tracked in git.
#
# On first `make install`, this file is copied to config/camera.toml.
# config/camera.toml is gitignored; edit it freely while experimenting.
#
# This file ONLY affects the "Fixed" cam.  The compass cardinals
# (North/East/South/West/Top), FPV, and TPV chase cam are hardcoded to
# arena geometry in core/mjcf/camera.py and core/drone/cf2x.py.
#
# Used by:
#   - VideoRecorderCallback when grid=false (single-cam fallback)
#   - demo/camera_test.py CAM=Fixed (`make camera-test CAM=Fixed`)
#   - core/quadrotor.py    (initial viewer pose for live demos)
#
# eye:    camera position in world coordinates [x, y, z] (metres)
# lookat: point the camera is aimed at         [x, y, z] (metres)
#
# Scene reference points:
#   arena radius 3 m, wall height 4.5 m,
#   drone start (0, 0, 0), hoop centre (2, 0, 2), hoop plane ⊥ +x.
# Walls are alpha=0.35 (translucent), so a camera outside the arena also works.

[camera]
eye    = [-2.5, -1.0, 2.0]    # south side, just inside the wall, slightly above hoop bottom
lookat = [ 1.5,  0.0, 1.3]    # between drone-start and hoop, ~1.3 m up
